name: Debug Release

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build from'
        required: true
        default: main
      include_hash_in_filename:
        description: 'Append the commit hash to the built package filename'
        required: true
        default: 'true'
      release_tag:
        description: 'Tag to use for the release (leave empty to use the latest tag)'
        required: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.branch }}
        fetch-depth: 0

    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y gettext

    - name: Determine commit hash
      id: hash
      run: |
        COMMIT_HASH=$(git rev-parse --short HEAD)
        echo "commit_hash=$COMMIT_HASH" >> $GITHUB_OUTPUT

    - name: Build plasmoid package
      run: python3 ./kpac build

    - name: Rename package with hash info
      id: package
      run: |
        PACKAGE_NAME=$(ls *.plasmoid | head -1)
        if [ "${{ github.event.inputs.include_hash_in_filename }}" = 'true' ]; then
          BASE_NAME=$(basename "$PACKAGE_NAME" .plasmoid)
          NEW_NAME="${BASE_NAME}-${{ steps.hash.outputs.commit_hash }}.plasmoid"
          mv "$PACKAGE_NAME" "$NEW_NAME"
          PACKAGE_NAME="$NEW_NAME"
        fi
        echo "name=$PACKAGE_NAME" >> $GITHUB_OUTPUT

    - name: Determine release tag
      id: tag
      run: |
        git fetch --tags
        if [ -n "${{ github.event.inputs.release_tag }}" ]; then
          echo "latest_tag=${{ github.event.inputs.release_tag }}" >> $GITHUB_OUTPUT
        else
          LATEST_TAG=$(git for-each-ref --sort=-creatordate --format '%(refname:short)' refs/tags | head -n 1)
          if [ -z "$LATEST_TAG" ]; then
            echo 'No git tags found. Release creation requires at least one tag.'
            exit 1
          fi
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
        fi

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: ${{ steps.package.outputs.name }}
        tag_name: ${{ steps.tag.outputs.latest_tag }}
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
