name: Debug Release

on:
  workflow_dispatch

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.ref_name }}
        fetch-depth: 0

    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y gettext

    - name: Determine commit hash
      id: hash
      run: |
        COMMIT_HASH=$(git rev-parse --short HEAD)
        echo "commit_hash=$COMMIT_HASH" >> $GITHUB_OUTPUT

    - name: Build plasmoid package
      run: python3 ./kpac build

    - name: Rename package with hash info
      id: package
      run: |
        PACKAGE_NAME=$(ls *.plasmoid | head -1)
        BASE_NAME=$(basename "$PACKAGE_NAME" .plasmoid)
        NEW_NAME="${BASE_NAME}-${{ steps.hash.outputs.commit_hash }}.plasmoid"
        mv "$PACKAGE_NAME" "$NEW_NAME"
        PACKAGE_NAME="$NEW_NAME"
        echo "name=$PACKAGE_NAME" >> $GITHUB_OUTPUT

    - name: Determine release tag
      id: tag
      run: |
        git fetch --tags
        BASE_TAG=$(git for-each-ref --sort=-creatordate --format '%(refname:short)' refs/tags | head -n 1)
        if [ -z "$BASE_TAG" ]; then
          echo 'No git tags found. Release creation requires at least one tag.'
          exit 1
        fi
        COMMIT_HASH=$(git rev-parse --short HEAD)
        PRERELEASE_TAG="${BASE_TAG}-dev-${COMMIT_HASH}"
        echo "latest_tag=$PRERELEASE_TAG" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: ${{ steps.package.outputs.name }}
        tag_name: ${{ steps.tag.outputs.latest_tag }}
        generate_release_notes: true
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
