name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Check if tag is on main branch
      run: |
        if [[ "$(git branch -r --contains $GITHUB_SHA | grep origin/main)" == "" ]]; then
          echo "Tag not on main branch, skipping release"
          exit 1
        fi

    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y gettext

    - name: Build plasmoid package
      run: python3 ./kpac build

    - name: Get package name
      id: package
      run: |
        PACKAGE_NAME=$(ls *.plasmoid | head -1)
        echo "name=$PACKAGE_NAME" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: ${{ steps.package.outputs.name }}
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}